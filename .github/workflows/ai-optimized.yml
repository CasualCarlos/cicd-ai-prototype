# =============================================================================
# AI-Geoptimaliseerde CI Pipeline — Config B
#
# Verschil ten opzichte van baseline.yml:
#   - Triggert op feature-branches en PRs (NIET op main — zie toelichting)
#   - Voert vóór pytest het AI-testselectie script uit (test_selector.py)
#   - Pytest krijgt alleen de geselecteerde testbestanden mee
#   - Fallback naar alle tests als de selectie mislukt of 0 tests oplevert
#
# Waarom NIET triggeren op main?
#   Op main loopt altijd de volledige testsuite (baseline.yml).
#   Dit is het veiligheidsnet: op main draait altijd de volledige testsuite.
#   AI-selectie is alleen veilig op feature-branches waar een PR
#   nog review krijgt vóór merge naar main.
# =============================================================================

name: AI-Optimized CI

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "scenario/**"
  pull_request:

# Minimale rechten conform security best practices
# pull-requests: write is nodig voor het plaatsen van AI-diagnosecommentaren
permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run selected tests (AI-optimized)
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Tijdstempel vastleggen vóór de pipeline start
      # ------------------------------------------------------------------
      - name: Record start time
        id: start
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 2. Broncode ophalen
      #    fetch-depth: 2 is verplicht zodat git diff HEAD~1 werkt;
      #    met de standaard fetch-depth: 1 is er maar één commit beschikbaar
      #    en geeft git diff een lege uitvoer.
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ------------------------------------------------------------------
      # 3. Python 3.11 instellen + pip-cache voor snellere runs
      # ------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ------------------------------------------------------------------
      # 4. Afhankelijkheden installeren
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ------------------------------------------------------------------
      # 5. Ensure results directory exists
      # ------------------------------------------------------------------
      - name: Create results directory
        run: mkdir -p results

      # ------------------------------------------------------------------
      # 6. SAST — zelfde als baseline, altijd uitvoeren ongeacht testselectie
      # ------------------------------------------------------------------
      - name: Run Bandit (SAST)
        continue-on-error: true
        run: bandit -r app/ -f json -o results/bandit-report.json

      # ------------------------------------------------------------------
      # 7. AI Testselectie
      #
      #    Het script leest `git diff HEAD~1 --name-only`, zoekt gewijzigde
      #    bestanden op in coverage_map.json en schrijft de geselecteerde
      #    testbestanden naar $GITHUB_OUTPUT als ruimtegescheiden string.
      #
      #    Exit codes van het script:
      #      0 = selectie geslaagd (gebruik geselecteerde tests)
      #      1 = onzekerheid / fallback vereist (gebruik alle tests)
      #
      #    continue-on-error: true — als het script crasht (bijv. door een
      #    importfout of ontbrekend bestand) valt de volgende stap terug op
      #    de volledige testsuite. De pipeline blokkeert nooit door de AI.
      # ------------------------------------------------------------------
      - name: AI Test Selection
        id: select
        continue-on-error: true
        run: |
          # Voer het selectiescript uit en vang zowel uitvoer als exitcode op
          SELECTED=$(python ai_component/test_selector.py)
          EXIT_CODE=$?

          echo "Test selector exit code: ${EXIT_CODE}"
          echo "Selected tests: ${SELECTED}"

          # Exporteer de geselecteerde tests en exitcode naar volgende stappen
          echo "tests=${SELECTED}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # 8. Annotatieregel: welke tests zijn geselecteerd en waarom?
      #    Zichtbaar in de workflow-logs als een opvallende samenvatting.
      # ------------------------------------------------------------------
      - name: Annotate selected tests
        run: |
          TESTS="${{ steps.select.outputs.tests }}"
          EXIT_CODE="${{ steps.select.outputs.exit_code }}"

          if [ "${EXIT_CODE}" = "0" ] && [ -n "${TESTS}" ]; then
            echo "::notice title=AI Test Selection::Geselecteerde tests: ${TESTS}"
          elif [ "${EXIT_CODE}" = "1" ] || [ -z "${TESTS}" ]; then
            echo "::warning title=AI Test Selection::Fallback naar alle tests (selectie onzeker of leeg)"
          fi

      # ------------------------------------------------------------------
      # 9. Geselecteerde tests uitvoeren
      #
      #    Logica:
      #      - Als het selectiescript exitcode 0 retourneerde EN tests bevat
      #        → voer alleen die tests uit (AI-geoptimaliseerd)
      #      - In alle andere gevallen (exitcode 1, leeg resultaat, of het
      #        script zelf mislukte via continue-on-error)
      #        → voer alle tests uit (veilige fallback)
      # ------------------------------------------------------------------
      - name: Run tests
        run: |
          TESTS="${{ steps.select.outputs.tests }}"
          EXIT_CODE="${{ steps.select.outputs.exit_code }}"
          STEP_OUTCOME="${{ steps.select.outcome }}"

          # Bepaal welke tests te draaien
          if [ "${STEP_OUTCOME}" = "success" ] && [ "${EXIT_CODE}" = "0" ] && [ -n "${TESTS}" ]; then
            echo "AI-modus: uitvoeren van geselecteerde tests: ${TESTS}"
            pytest ${TESTS} --tb=short --junitxml=results/test-results.xml -v
          else
            echo "Fallback-modus: uitvoeren van ALLE tests"
            pytest tests/ --tb=short --junitxml=results/test-results.xml -v
          fi

      # ------------------------------------------------------------------
      # 10. Tijdstempel vastleggen ná de pipeline + duur berekenen
      # ------------------------------------------------------------------
      - name: Record end time and calculate duration
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          TESTS="${{ steps.select.outputs.tests }}"
          MODE="fallback"
          if [ -n "${TESTS}" ] && [ "${{ steps.select.outputs.exit_code }}" = "0" ]; then
            MODE="ai-selected"
          fi
          echo "Pipeline duration: ${DURATION} seconds (mode: ${MODE})"
          mkdir -p results
          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ"),ai-optimized,${DURATION},${MODE}" >> results/timing.csv

      # ------------------------------------------------------------------
      # 11. AI Log Analyse — draait alleen bij een mislukte test-stap
      #
      #     Stuurt de pytest-uitvoer (JUnit XML) naar OpenAI gpt-4o-mini
      #     voor root-cause analyse. Het resultaat wordt opgeslagen in
      #     results/ai-diagnosis.md en naar stdout geschreven.
      #
      #     continue-on-error: true — de pipeline blokkeert NOOIT door de AI
      # ------------------------------------------------------------------
      - name: AI Log Analysis
        if: failure()
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python ai_component/log_analyzer.py results/test-results.xml

      # ------------------------------------------------------------------
      # 12. Diagnose als PR-commentaar plaatsen
      #
      #     Leest results/ai-diagnosis.md (aangemaakt door stap 11) en post
      #     de inhoud als commentaar op de huidige PR. Als er geen PR-context
      #     is (bijv. push zonder open PR), wordt alleen naar stdout geschreven.
      #
      #     continue-on-error: true — de pipeline blokkeert NOOIT door de AI
      # ------------------------------------------------------------------
      - name: Post AI diagnosis as PR comment
        if: failure()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/post_pr_comment.py

      # ------------------------------------------------------------------
      # 13. Resultaten uploaden als artifact (bewaard gedurende 30 dagen)
      # ------------------------------------------------------------------
      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-optimized-results-${{ github.run_number }}
          path: results/
          retention-days: 30
